services:
  postgres:
    image: postgres:16-alpine
    container_name: jdboss-postgres
    environment:
      POSTGRES_USER: jdboss
      POSTGRES_PASSWORD: jdboss
      POSTGRES_DB: jdboss
    ports:
      - "5432:5432"
    volumes:
      - jdboss-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jdboss -d jdboss"]
      interval: 5s
      timeout: 5s
      retries: 20
  adminer:
    image: adminer:4.17.1
    container_name: jdboss-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Pre-fill the login server field in the Adminer UI.
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  jdboss-postgres-data:
